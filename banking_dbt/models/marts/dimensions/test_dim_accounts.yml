version: 2

models:
  - name: dim_accounts
    description: "Dimension table for accounts with snapshots"
    columns:
      - name: account_id
        tests:
          - not_null
          - unique

      - name: balance
        tests:
          - not_null
          - accepted_values:
              values: [0, 100, 500, 1000, 2000]  # <-- just for demo, adjust later
