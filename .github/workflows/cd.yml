name: CD

on:
  push:
    branches: [ main ]  # deploy only from main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Simulate DAGs deployment
      - name: Deploy Airflow DAGs (simulation)
        run: |
          mkdir -p _deployed/airflow_dags
          rsync -avz docker/dags/ _deployed/airflow_dags/
          echo "✅ DAGs copied to _deployed/airflow_dags (simulation)"

      # 3️⃣ Simulate dbt project deployment
      - name: Deploy dbt project (simulation)
        run: |
          mkdir -p _deployed/dbt_project
          rsync -avz banking_dbt/ _deployed/dbt_project/
          echo "✅ dbt project copied to _deployed/dbt_project (simulation)"

      # 4️⃣ Info for manual restart
      - name: Manual restart instructions
        run: |
          echo "--------------------------------------------------"
          echo " Deployment simulation complete!"
          echo " To apply changes in your local environment, run:"
          echo "   docker-compose restart airflow-scheduler airflow-webserver"
          echo "--------------------------------------------------"
