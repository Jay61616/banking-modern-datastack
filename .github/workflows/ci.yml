name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run linters
        run: |
          echo "Linting placeholder (add flake8/ruff in repo later)"

      - name: Run unit tests
        run: |
          echo "pytest placeholder (populate tests/ later)"

      - name: dbt deps (skeleton)
        run: |
          echo "dbt deps placeholder"
